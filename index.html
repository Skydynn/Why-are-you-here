<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why are you here?</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: white;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        button {
            background: none;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 0 15px;
            padding: 5px;
        }

        button:hover {
            background-color: white;
            color: black;
        }

        #crack-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: white;
            clip-path: polygon(45% 0, 50% 20%, 40% 50%, 55% 70%, 48% 100%, 52% 100%, 58% 70%, 45% 50%, 55% 20%, 50% 0);
            display: none;
            pointer-events: none;
            z-index: 100;
        }

        #terminal-text {
            font-size: 1.5rem;
            min-height: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="crack-overlay"></div>

    <div id="terminal-wrapper">
        <span id="terminal-text"></span><span class="cursor"></span>
    </div>

    <div id="choices" style="visibility: hidden; margin-top: 40px;">
        <button onclick="handleChoice('yes')">[ YES ]</button>
        <button onclick="handleChoice('no')">[ NO ]</button>
    </div>

    <script>
        let i = 0;
        let currentMessage = "Are you alone?";
        const speed = 100;
        let audioCtx;

        // Function to init Audio (Browsers need a click to start audio)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTypingSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400 + Math.random() * 200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        function playGlitchSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function typeWriter() {
            if (i < currentMessage.length) {
                document.getElementById("terminal-text").innerHTML += currentMessage.charAt(i);
                playTypingSound();
                i++;
                setTimeout(typeWriter, speed);
            } else {
                document.getElementById("choices").style.visibility = "visible";
            }
        }

        function handleChoice(choice) {
            initAudio();
            const textElement = document.getElementById('terminal-text');
            const choiceElement = document.getElementById('choices');
            
            choiceElement.style.visibility = "hidden";
            textElement.innerHTML = "";
            i = 0;

            if (choice === 'no') {
                document.getElementById('crack-overlay').style.display = 'block';
                playGlitchSound();
                currentMessage = "LIAR. I can see you.";
                setTimeout(typeWriter, 500);
            } else {
                currentMessage = "Good. Then we are alone... together.";
                setTimeout(typeWriter, 500);
            }
        }

        // Wait for first click to start everything (fixes Safari audio)
        window.addEventListener('click', function() {
            if (document.getElementById("terminal-text").innerHTML === "") {
                initAudio();
                typeWriter();
            }
        }, { once: true });

    </script>
</body>
</html>
