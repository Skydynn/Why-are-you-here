<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why are you here?</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase; /* Makes it look like an old computer */
        }

        #terminal-text {
            font-size: 1.5rem;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.4rem;
            background-color: white;
            margin-left: 8px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #crack-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: white;
            clip-path: polygon(45% 0, 50% 20%, 40% 50%, 55% 70%, 48% 100%, 52% 100%, 58% 70%, 45% 50%, 55% 20%, 50% 0);
            display: none;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="crack-overlay"></div>

    <div id="terminal-wrapper">
        <span id="terminal-text"></span><span class="cursor"></span>
    </div>

    <script>
        let i = 0;
        let currentMessage = "ARE YOU ALONE? (Y/N)";
        const speed = 80;
        let audioCtx;
        let canInput = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTypingSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400 + Math.random() * 200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        }

        function playGlitchSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function typeWriter() {
            if (i < currentMessage.length) {
                document.getElementById("terminal-text").innerHTML += currentMessage.charAt(i);
                playTypingSound();
                i++;
                setTimeout(typeWriter, speed);
            } else {
                canInput = true; // Player can only type once message finishes
            }
        }

        // Listen for keyboard input
        window.addEventListener('keydown', function(e) {
            if (!canInput) return;
            
            const key = e.key.toLowerCase();
            if (key === 'y' || key === 'n') {
                handleChoice(key);
            }
        });

        function handleChoice(choice) {
            canInput = false;
            const textElement = document.getElementById('terminal-text');
            textElement.innerHTML = "";
            i = 0;

            if (choice === 'n') {
                document.getElementById('crack-overlay').style.display = 'block';
                playGlitchSound();
                currentMessage = "LIAR. I SEE YOU.";
                setTimeout(typeWriter, 800);
            } else {
                // Fetch location for the scare
                fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    currentMessage = `GOOD. IT IS QUIET IN ${data.city.toUpperCase()}. I AM COMING OVER.`;
                    setTimeout(typeWriter, 500);
                })
                .catch(() => {
                    currentMessage = "GOOD. I AM COMING OVER.";
                    setTimeout(typeWriter, 500);
                });
            }
        }

        // Initial Start
        window.addEventListener('click', function() {
            if (document.getElementById("terminal-text").innerHTML === "") {
                initAudio();
                typeWriter();
            }
        }, { once: true });

    </script>
</body>
</html>
